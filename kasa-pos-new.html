<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Каса POS</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *{box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif} html,body{margin:0;height:100%;overflow:hidden;background:#f2f2f7}.app{height:100%;display:flex;flex-direction:column}.header{display:flex;gap:12px;padding:16px}.btn-mode,.modal-btn{border:0;border-radius:12px;color:#fff;font-weight:700;cursor:pointer}.btn-mode{flex:1;padding:18px;font-size:22px}.btn-blue{background:#007aff}.btn-green{background:#34c759}.btn-orange{background:#ff9500}.btn-red{background:#ff3b30}.btn-gray{background:#8e8e93}.dimmed{opacity:.45}.low-stock-banner{display:none;margin:0 16px 10px;padding:12px;border-radius:12px;background:#fff3cd;color:#8a4b00;font-weight:700}.camera-frame{display:none;margin:0 16px 10px;background:#000;border-radius:14px;overflow:hidden;position:relative;height:250px}#reader,#cameraPreview{width:100%;height:100%;object-fit:cover}.camera-status{position:absolute;left:0;right:0;bottom:0;padding:8px;background:rgba(0,0,0,.65);color:white;text-align:center}.manual-row{display:flex;gap:8px;margin:0 16px 10px}.manual-row input,input{width:100%;padding:12px;font-size:16px;border:1px solid #ddd;border-radius:10px;-webkit-user-select:text;user-select:text}.manual-row button{width:110px}.check-container{flex:1;overflow:auto;padding:16px;-webkit-overflow-scrolling:touch}.check-item,.product-row,.settings-card{background:white;border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08)}.check-item{display:flex;justify-content:space-between;gap:10px}.muted{color:#777;font-size:14px}.stock-number{font-weight:900}.stock-ok{color:#188038}.stock-low{color:#ff9500}.stock-zero{color:#ff3b30}.footer{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px;background:#fff;border-top:1px solid #ddd}.btn-settings{width:52px;height:52px;border-radius:50%;border:0;color:white;background:#8e8e93;font-size:24px}.total-sum{font-size:22px;font-weight:900}.btn-pay{padding:14px 18px;border:0;border-radius:12px;background:#ff9500;color:#fff;font-size:18px;font-weight:900}.archive-sheet{position:absolute;left:0;right:0;bottom:-72%;height:72%;background:#004080;border-radius:20px 20px 0 0;z-index:20;transition:.25s;display:flex;flex-direction:column}.archive-sheet.open{bottom:0}.archive-handle{height:54px;display:flex;justify-content:center;align-items:center}.handle-bar{width:64px;height:6px;background:rgba(255,255,255,.55);border-radius:5px}.archive-title{color:white;text-align:center;font-weight:900}.archive-list{flex:1;overflow:auto;background:#fff;border-radius:18px 18px 0 0;padding:14px}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:50;align-items:center;justify-content:center;padding:16px}.modal-box{background:#fff;border-radius:18px;padding:18px;width:100%;max-width:520px;max-height:88vh;overflow:auto}.modal-btn{display:block;width:100%;padding:14px;margin:8px 0;font-size:18px}.section-title{display:flex;justify-content:space-between;align-items:center;width:100%;padding:14px;border:0;border-radius:12px;background:#eef5ff;font-size:18px;font-weight:900;text-align:left}.section-body{display:none;padding-top:10px}.section-body.open{display:block}.product-actions{display:flex;gap:8px}.product-actions button{flex:1}.fullscreen-cash{font-size:70px;color:#34c759;font-weight:900;text-align:center;margin-bottom:25px}#toast{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.82);color:#fff;padding:18px 28px;border-radius:14px;z-index:100;font-size:22px;font-weight:900;text-align:center}
  </style>
</head>
<body oncontextmenu="return false">
<div class="app">
  <div class="header"><button id="btnPrice" class="btn-mode btn-blue" onclick="toggleMode('PRICE')">🔍 Ціна</button><button id="btnCheck" class="btn-mode btn-green" onclick="toggleMode('CHECK')">📝 Чек</button></div>
  <div id="lowStockBanner" class="low-stock-banner"></div>
  <div id="reader-container" class="camera-frame"><div id="reader"></div><video id="cameraPreview" autoplay muted playsinline webkit-playsinline style="display:none"></video><div id="cameraStatus" class="camera-status">Камера вимкнена</div></div>
  <div class="manual-row"><input id="manualBarcode" placeholder="Ручний штрихкод"><button class="modal-btn btn-gray" onclick="manualScan()">OK</button></div>
  <div class="check-container" id="checkList"></div>
  <div class="footer"><button class="btn-settings" onclick="openSettings()">⚙️</button><div id="totalSumLabel" class="total-sum">0.00 грн</div><button class="btn-pay" onclick="openPaymentMenu()">ОПЛАТА</button></div>
</div>
<div class="archive-sheet" id="archiveSheet"><div class="archive-handle" onclick="toggleArchive()"><div class="handle-bar"></div></div><div class="archive-title">📜 Архів чеків</div><div class="archive-list" id="archiveList"></div></div>
<div class="modal-overlay" id="modalPaymentMenu"><div class="modal-box"><h2>Оплата</h2><h1 id="payModalSum"></h1><button class="modal-btn btn-green" onclick="payCash()">💵 Готівка</button><button class="modal-btn btn-blue" onclick="payCard()">💳 Картка QR</button><button class="modal-btn btn-red" onclick="closeModal('modalPaymentMenu')">Скасувати</button></div></div>
<div class="modal-overlay" id="modalCash" style="background:#000"><div><div id="cashAmountDisplay" class="fullscreen-cash"></div><button class="modal-btn btn-green" onclick="finishPayment('Готівка')">Закрити чек</button></div></div>
<div class="modal-overlay" id="modalQR"><div class="modal-box"><h2>Скануйте для оплати</h2><div id="qrcode" style="display:flex;justify-content:center;margin:18px"></div><h3 id="qrExactSum"></h3><button class="modal-btn btn-blue" onclick="finishPayment('Картка')">Успішно сплачено</button><button class="modal-btn btn-red" onclick="closeModal('modalQR')">Скасувати</button></div></div>
<div class="modal-overlay" id="modalSettings"><div class="modal-box"><h2>⚙️ Налаштування</h2>
  <button class="section-title" onclick="toggleSection('secMain')">Основне <span>⌄</span></button><div id="secMain" class="section-body open"><label>Банка Monobank</label><input id="setMonoLink"><label>Час показу ціни (сек)</label><input type="number" id="setToastTime"></div>
  <button class="section-title" onclick="toggleSection('secProducts')">📦 Товари <span>⌄</span></button><div id="secProducts" class="section-body"><button class="modal-btn btn-green" onclick="toggleSection('secAddProduct')">➕ Додати товар</button><div id="secAddProduct" class="section-body"><input id="newBarcode" placeholder="Штрихкод"><input id="newName" placeholder="Назва"><input id="newPrice" type="number" placeholder="Ціна"><input id="newQty" type="number" placeholder="Кількість на складі"><button class="modal-btn btn-green" onclick="addProductToDB()">Зберегти товар</button></div><h3>Список товарів</h3><div id="productList"></div></div>
  <button class="section-title" onclick="toggleSection('secServer')">🖥️ Сервер <span>⌄</span></button><div id="secServer" class="section-body"><label><input type="checkbox" id="setServerEnabled"> Увімкнути сервер</label><input id="setServerUrl" placeholder="http://192.168.1.10:8787"><p class="muted">Окрема папка <b>server</b> приймає чеки та товари через /pos-data.</p><button class="modal-btn btn-gray" onclick="syncFromServer()">⬇️ Завантажити</button><button class="modal-btn btn-gray" onclick="syncToServer()">⬆️ Зберегти</button></div>
  <button class="modal-btn btn-blue" onclick="saveSettings()">Зберегти та закрити</button><button class="modal-btn btn-red" onclick="closeModal('modalSettings')">Скасувати</button></div></div>
<div id="toast"></div>
<script>
var db={"4820000000001":{name:"Хліб Бородинський",price:24.50,qty:5,lastSold:""},"4820000000002":{name:"Молоко 2.5%",price:42.12,qty:2,lastSold:""}},currentCheck=[],archiveChecks=[],currentMode="NONE",html5QrCode=null,isScanning=false,currentTotal=0,currentTotalRounded=0,isArchiveOpen=false;
var config={monoLink:"https://send.monobank.ua/885j7KC9JM",toastTime:2000,serverEnabled:false,serverUrl:""};
function safeLoad(k,d){try{return JSON.parse(localStorage.getItem(k))||d;}catch(e){return d;}}function saveAll(){localStorage.setItem('pos_db',JSON.stringify(db));localStorage.setItem('pos_archive',JSON.stringify(archiveChecks));localStorage.setItem('pos_config',JSON.stringify(config));}
window.onload=function(){db=safeLoad('pos_db',db);archiveChecks=safeLoad('pos_archive',archiveChecks);config=safeLoad('pos_config',config);normalizeProducts();updateCheckUI();updateArchiveUI();updateLowStockBanner();document.addEventListener('copy',function(e){e.preventDefault();});document.addEventListener('selectstart',function(e){if(e.target.tagName!=='INPUT')e.preventDefault();});};
function normalizeProducts(){for(var code in db){if(typeof db[code].qty!=='number')db[code].qty=0;if(!db[code].lastSold)db[code].lastSold='';}}
function toggleMode(mode){var c=document.getElementById('reader-container');if(currentMode===mode){currentMode='NONE';c.style.display='none';stopScanner();}else{currentMode=mode;c.style.display='block';startScanner();}document.getElementById('btnPrice').className='btn-mode btn-blue '+(currentMode==='CHECK'?'dimmed':'');document.getElementById('btnCheck').className='btn-mode btn-green '+(currentMode==='PRICE'?'dimmed':'');}
function startScanner(){document.getElementById('cameraStatus').innerHTML='Запуск камери...';if(location.protocol==='file:'){document.getElementById('cameraStatus').innerHTML='Камера не працює з file://. Запустіть сервер.';return;}if(!window.Html5Qrcode){document.getElementById('cameraStatus').innerHTML='Немає бібліотеки сканера. Введіть код вручну.';return;}if(isScanning)return;if(!html5QrCode)html5QrCode=new Html5Qrcode('reader');html5QrCode.start({facingMode:'environment'},{fps:10,qrbox:{width:250,height:150}},function(text){stopScanner();handleScan(text);setTimeout(function(){if(currentMode!=='NONE')startScanner();},900);},function(){}).then(function(){isScanning=true;document.getElementById('cameraStatus').innerHTML='Наведіть камеру на штрихкод';}).catch(function(){document.getElementById('cameraStatus').innerHTML='Камера недоступна. Дозвольте доступ або введіть код вручну.';});}
function stopScanner(){if(html5QrCode&&isScanning){html5QrCode.stop().catch(function(){});}isScanning=false;}
function manualScan(){var v=document.getElementById('manualBarcode').value.replace(/\s/g,'');if(v){document.getElementById('manualBarcode').value='';handleScan(v);}}
function handleScan(barcode){var p=db[barcode];if(!p){showToast('❌ Штрихкод не знайдено');return;}if(currentMode==='PRICE'){showToast(p.name+'<br>💰 '+p.price.toFixed(2)+' грн<br>На складі: '+p.qty,config.toastTime);return;}var ex=null;for(var i=0;i<currentCheck.length;i++){if(currentCheck[i].barcode===barcode)ex=currentCheck[i];}if(ex)ex.qty++;else currentCheck.push({barcode:barcode,name:p.name,price:p.price,qty:1});showToast('➕ '+p.name);updateCheckUI();}
function updateCheckUI(){var list=document.getElementById('checkList'),total=0;list.innerHTML='';for(var i=0;i<currentCheck.length;i++){var it=currentCheck[i],sum=it.price*it.qty;total+=sum;list.innerHTML+='<div class="check-item"><div><b>'+escapeHtml(it.name)+'</b><div class="muted">'+it.qty+' шт. × '+it.price.toFixed(2)+' грн</div></div><b>'+sum.toFixed(2)+' грн</b></div>';}document.getElementById('totalSumLabel').innerHTML=total.toFixed(2)+' грн';}
function openPaymentMenu(){if(!currentCheck.length){showToast('Чек порожній');return;}currentTotal=0;for(var i=0;i<currentCheck.length;i++)currentTotal+=currentCheck[i].price*currentCheck[i].qty;document.getElementById('payModalSum').innerHTML=currentTotal.toFixed(2)+' грн';document.getElementById('modalPaymentMenu').style.display='flex';}
function payCash(){closeModal('modalPaymentMenu');currentTotalRounded=Math.ceil(currentTotal);document.getElementById('cashAmountDisplay').innerHTML=currentTotalRounded+' ГРН';document.getElementById('modalCash').style.display='flex';}
function payCard(){closeModal('modalPaymentMenu');currentTotalRounded=currentTotal;document.getElementById('qrExactSum').innerHTML='Сума: '+currentTotal.toFixed(2)+' грн';document.getElementById('qrcode').innerHTML='';if(window.QRCode)new QRCode(document.getElementById('qrcode'),{text:config.monoLink+'?a='+currentTotal.toFixed(2),width:200,height:200});document.getElementById('modalQR').style.display='flex';}
function finishPayment(type){var now=new Date().toLocaleString('uk-UA');for(var i=0;i<currentCheck.length;i++){var it=currentCheck[i],p=db[it.barcode];if(p){p.qty=Math.max(0,(Number(p.qty)||0)-it.qty);p.lastSold=now;}}archiveChecks.unshift({date:now,type:type,totalOriginal:currentTotal,totalPaid:currentTotalRounded,items:currentCheck.slice(0)});currentCheck=[];saveAll();closeModal('modalCash');closeModal('modalQR');updateCheckUI();updateArchiveUI();updateLowStockBanner();if(config.serverEnabled)syncToServer(true);showToast('✅ Оплачено. Склад оновлено');}
function updateLowStockBanner(){var low=[];for(var code in db){if(Number(db[code].qty)<3)low.push(db[code].name+' — '+db[code].qty);}var b=document.getElementById('lowStockBanner');b.style.display=low.length?'block':'none';b.innerHTML=low.length?'⚠️ Треба закупитися: '+escapeHtml(low.join(', ')):'';}
function toggleArchive(){isArchiveOpen=!isArchiveOpen;document.getElementById('archiveSheet').className=isArchiveOpen?'archive-sheet open':'archive-sheet';}
function updateArchiveUI(){var l=document.getElementById('archiveList');l.innerHTML='';for(var i=0;i<archiveChecks.length;i++){var c=archiveChecks[i];l.innerHTML+='<div class="product-row"><b>'+c.date+'</b> ['+c.type+']<br>Сума: <b>'+Number(c.totalPaid).toFixed(2)+' грн</b></div>';}}
function openSettings(){document.getElementById('setMonoLink').value=config.monoLink;document.getElementById('setToastTime').value=config.toastTime/1000;document.getElementById('setServerEnabled').checked=!!config.serverEnabled;document.getElementById('setServerUrl').value=config.serverUrl||'';renderProductList();document.getElementById('modalSettings').style.display='flex';}
function saveSettings(){config.monoLink=document.getElementById('setMonoLink').value;config.toastTime=Number(document.getElementById('setToastTime').value||2)*1000;config.serverEnabled=document.getElementById('setServerEnabled').checked;config.serverUrl=document.getElementById('setServerUrl').value.replace(/\/$/,'');saveAll();closeModal('modalSettings');showToast('Налаштування збережено');}
function toggleSection(id){var e=document.getElementById(id);e.className=e.className.indexOf('open')>=0?'section-body':'section-body open';if(id==='secProducts')renderProductList();}
function addProductToDB(){var b=document.getElementById('newBarcode').value.replace(/\s/g,''),n=document.getElementById('newName').value,p=parseFloat(document.getElementById('newPrice').value),q=parseInt(document.getElementById('newQty').value,10);if(!b||!n||!(p>0)){showToast('Заповніть штрихкод, назву і ціну');return;}db[b]={name:n,price:p,qty:isNaN(q)?0:q,lastSold:''};saveAll();renderProductList();updateLowStockBanner();showToast('Товар збережено');}
function renderProductList(){var l=document.getElementById('productList');if(!l)return;l.innerHTML='';for(var code in db){var p=db[code],cls=p.qty<=0?'stock-zero':(p.qty<3?'stock-low':'stock-ok');l.innerHTML+='<div class="product-row"><b>'+escapeHtml(p.name)+'</b><div class="muted">'+code+' • '+p.price.toFixed(2)+' грн • останній продаж: '+(p.lastSold||'ще не купляли')+'</div><label>Кількість</label><input id="qty_'+code+'" type="number" value="'+p.qty+'"><div>На складі: <span class="stock-number '+cls+'">'+p.qty+'</span></div><div class="product-actions"><button class="modal-btn btn-blue" onclick="saveProductQty(\''+code+'\')">Змінити</button><button class="modal-btn btn-red" onclick="deleteProduct(\''+code+'\')">Видалити</button></div></div>';}}
function saveProductQty(code){db[code].qty=parseInt(document.getElementById('qty_'+code).value,10)||0;saveAll();renderProductList();updateLowStockBanner();}
function deleteProduct(code){delete db[code];saveAll();renderProductList();updateLowStockBanner();}
function syncToServer(silent){if(!config.serverEnabled||!config.serverUrl){if(!silent)showToast('Вкажіть адресу сервера');return;}ajax('POST',config.serverUrl+'/pos-data',{db:db,archiveChecks:archiveChecks,config:config},function(){if(!silent)showToast('✅ Збережено на сервер');},function(){if(!silent)showToast('❌ Сервер недоступний');});}
function syncFromServer(){if(!config.serverEnabled||!config.serverUrl){showToast('Вкажіть адресу сервера');return;}ajax('GET',config.serverUrl+'/pos-data',null,function(d){if(d.db)db=d.db;if(d.archiveChecks)archiveChecks=d.archiveChecks;if(d.config)config=d.config;config.serverEnabled=true;normalizeProducts();saveAll();updateArchiveUI();updateLowStockBanner();openSettings();showToast('✅ Завантажено');},function(){showToast('❌ Не вдалося завантажити');});}
function ajax(m,u,data,ok,bad){var x=new XMLHttpRequest();x.open(m,u,true);x.setRequestHeader('Content-Type','application/json');x.onreadystatechange=function(){if(x.readyState===4){if(x.status>=200&&x.status<300){try{ok(JSON.parse(x.responseText||'{}'));}catch(e){ok({});}}else bad();}};x.onerror=bad;x.send(data?JSON.stringify(data):null);}
function closeModal(id){document.getElementById(id).style.display='none';}function showToast(t,ms){var e=document.getElementById('toast');e.innerHTML=t;e.style.display='block';setTimeout(function(){e.style.display='none';},ms||2000);}function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
</script>
</body>
</html>
